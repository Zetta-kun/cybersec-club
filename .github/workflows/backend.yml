name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'simple_backend.py'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn python-jose[cryptography] passlib[bcrypt] httpx pytest
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short || echo "No tests yet"
    
    - name: Check API health
      run: |
        uvicorn simple_backend:app --host 0.0.0.0 --port 8000 &
        sleep 3
        curl http://localhost:8000/health | grep "healthy"
  
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install linters
      run: pip install black isort flake8
    
    - name: Check formatting (Black)
      run: black --check backend/ simple_backend.py || true
    
    - name: Check imports (isort)
      run: isort --check-only backend/ simple_backend.py || true
    
    - name: Lint with flake8
      run: flake8 backend/ simple_backend.py --count --max-line-length=120 --statistics || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Bandit security scanner
      uses: PyCQA/bandit-action@v1
      with:
        path: backend/
    
    - name: Check dependencies
      run: |
        pip install safety
        pip freeze > requirements.txt 2>/dev/null || true
        safety check || true