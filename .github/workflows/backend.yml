name: Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - run: pip install -r requirements.txt pytest httpx
    - run: |
        uvicorn simple_backend:app --host 0.0.0.0 --port 8000 &
        sleep 3
        python -c "import httpx; r = httpx.get('http://localhost:8000/health'); print(r.json()); assert r.json()['status'] == 'healthy'"
        echo "✅ Backend is working!"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install black isort flake8
    - run: black --check simple_backend.py || true
    - run: isort --check-only simple_backend.py || true
    - run: flake8 simple_backend.py --count --max-line-length=120 --exit-zero