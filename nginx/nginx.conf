user nginx; worker_processes auto; events { worker_connections 1024; } http { include /etc/nginx/mime.types; default_type application/octet-stream; sendfile on; gzip on; gzip_types text/plain text/css application/json application/javascript; server { listen 80; server_name localhost; location / { root /usr/share/nginx/html; try_files $uri /index.html; } location /api/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; } } }
